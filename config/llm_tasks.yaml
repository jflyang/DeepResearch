defaults:
  provider: active
  model: "qwen3:8b"
  temperature: 0.2
  max_input_chars: 6000
  max_output_tokens: 1000
  timeout_seconds: 120
  json_required: true
  retry_on_parse_error: true
  max_retries: 1
  require_llm: false

tasks:
  # === Planning Stage ===

  topic_understanding:
    enabled: true
    implemented: true
    temperature: 0.1
    max_input_chars: 2000
    max_output_tokens: 800
    fallback: rule_based_topic_understanding

  language_planning:
    enabled: true
    implemented: true
    temperature: 0.1
    max_input_chars: 2000
    max_output_tokens: 800
    fallback: rule_based_language_planning

  query_expansion:
    enabled: true
    implemented: true
    provider: active
    temperature: 0.3
    max_input_chars: 3000
    max_output_tokens: 1200
    fallback: rule_based_query_expansion

  query_translation:
    enabled: true
    implemented: false
    temperature: 0.1
    max_input_chars: 1000
    max_output_tokens: 500
    fallback: dictionary_or_rule_translation

  # === Scoring Stage ===

  source_review:
    enabled: false
    implemented: true
    temperature: 0.1
    max_input_chars: 2500
    max_output_tokens: 700
    fallback: rule_based_scoring

  source_reason_generation:
    enabled: false
    implemented: false
    temperature: 0.2
    max_input_chars: 2000
    max_output_tokens: 500
    fallback: rule_reason_to_read

  # === Analysis Stage ===

  entity_extraction:
    enabled: true
    implemented: true
    temperature: 0.1
    max_input_chars: 8000
    max_output_tokens: 1200
    fallback: regex_entity_extraction

  document_summary:
    enabled: true
    implemented: true
    temperature: 0.3
    max_input_chars: 12000
    max_output_tokens: 1800
    fallback: empty_summary

  story_point_extraction:
    enabled: true
    implemented: false
    temperature: 0.3
    max_input_chars: 10000
    max_output_tokens: 1500
    fallback: keyword_story_extraction

  gossip_classification:
    enabled: true
    implemented: false
    temperature: 0.1
    max_input_chars: 3000
    max_output_tokens: 500
    fallback: rule_based_gossip_detection

  timeline_extraction:
    enabled: true
    implemented: false
    temperature: 0.1
    max_input_chars: 8000
    max_output_tokens: 1000
    fallback: rule_based_date_extraction

  # === Synthesis Stage ===

  contradiction_detection:
    enabled: false
    implemented: false
    temperature: 0.1
    max_input_chars: 12000
    max_output_tokens: 1200
    fallback: skip

  research_card_generation:
    enabled: true
    implemented: false
    temperature: 0.3
    max_input_chars: 10000
    max_output_tokens: 1800
    fallback: rule_based_cards

  # === Export Stage ===

  markdown_summary_generation:
    enabled: true
    implemented: false
    temperature: 0.3
    max_input_chars: 10000
    max_output_tokens: 1500
    fallback: empty_sections

  final_index_synthesis:
    enabled: false
    implemented: false
    temperature: 0.3
    max_input_chars: 8000
    max_output_tokens: 2000
    fallback: rule_based_index

  # === Processing Stage (optional) ===

  reranking:
    enabled: false
    implemented: false
    temperature: 0.1
    max_input_chars: 5000
    max_output_tokens: 800
    fallback: score_sort

  # === Report Ingestion Stage ===

  report_understanding:
    enabled: true
    implemented: true
    temperature: 0.2
    max_input_chars: 12000
    max_output_tokens: 1800
    fallback: empty_report_understanding

  report_reference_extraction:
    enabled: true
    implemented: true
    temperature: 0.2
    max_input_chars: 12000
    max_output_tokens: 2200
    fallback: rule_only_references

  imported_source_prioritization:
    enabled: true
    implemented: true
    temperature: 0.1
    max_input_chars: 8000
    max_output_tokens: 1600
    fallback: keep_rule_priority

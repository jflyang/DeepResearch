defaults:
  provider: active
  model: "qwen3:8b"
  temperature: 0.2
  max_input_chars: 6000
  max_output_tokens: 1000
  timeout_seconds: 120
  json_required: true
  retry_on_parse_error: true
  max_retries: 1
  require_llm: false

tasks:
  # === Planning Stage ===

  topic_understanding:
    enabled: true
    implemented: true
    stage: planning
    temperature: 0.1
    max_input_chars: 2000
    max_output_tokens: 800
    fallback: rule_based_topic_understanding

  language_planning:
    enabled: true
    implemented: true
    stage: planning
    covered_by: topic_understanding
    temperature: 0.1
    max_input_chars: 2000
    max_output_tokens: 800
    fallback: rule_based_language_planning

  query_expansion:
    enabled: true
    implemented: true
    stage: planning
    provider: active
    temperature: 0.3
    max_input_chars: 3000
    max_output_tokens: 1200
    fallback: rule_based_query_expansion

  query_translation:
    enabled: true
    implemented: true
    stage: planning
    prompt_template: query_translation.zh.md
    temperature: 0.1
    max_input_chars: 2000
    max_output_tokens: 800
    json_required: true
    retry_on_parse_error: true
    max_retries: 1
    fallback: dictionary_or_rule_translation

  # === Scoring Stage ===

  book_relevance_review:
    enabled: true
    implemented: true
    stage: scoring
    prompt_template: book_relevance_review.zh.md
    provider: ${ACTIVE_LLM_PROVIDER}
    model: ${ACTIVE_LLM_MODEL}
    temperature: 0.1
    max_input_chars: 3000
    max_output_tokens: 800
    fallback: rule_book_relevance_filter

  source_review:
    enabled: false
    implemented: true
    stage: scoring
    temperature: 0.1
    max_input_chars: 2500
    max_output_tokens: 700
    fallback: rule_based_scoring

  source_reason_generation:
    enabled: true
    implemented: true
    stage: scoring
    temperature: 0.2
    max_input_chars: 2000
    max_output_tokens: 500
    json_required: true
    fallback: rule_reason_to_read

  # === Analysis Stage ===

  entity_extraction:
    enabled: true
    implemented: true
    stage: analysis
    wait_for: extraction
    temperature: 0.1
    max_input_chars: 8000
    max_output_tokens: 1200
    fallback: regex_entity_extraction

  document_summary:
    enabled: true
    implemented: true
    stage: analysis
    wait_for: extraction
    temperature: 0.3
    max_input_chars: 12000
    max_output_tokens: 1800
    fallback: empty_summary

  story_point_extraction:
    enabled: true
    implemented: false
    stage: analysis
    wait_for: extraction
    temperature: 0.3
    max_input_chars: 10000
    max_output_tokens: 1500
    fallback: keyword_story_extraction

  gossip_classification:
    enabled: true
    implemented: false
    stage: analysis
    temperature: 0.1
    max_input_chars: 3000
    max_output_tokens: 500
    fallback: rule_based_gossip_detection

  timeline_extraction:
    enabled: true
    implemented: false
    stage: analysis
    wait_for: extraction
    temperature: 0.1
    max_input_chars: 8000
    max_output_tokens: 1000
    fallback: rule_based_date_extraction

  # === Synthesis Stage ===

  contradiction_detection:
    enabled: false
    implemented: false
    stage: synthesis
    temperature: 0.1
    max_input_chars: 12000
    max_output_tokens: 1200
    fallback: skip

  research_card_generation:
    enabled: true
    implemented: false
    stage: synthesis
    temperature: 0.3
    max_input_chars: 10000
    max_output_tokens: 1800
    fallback: rule_based_cards

  # === Content Normalization & Synthesis Stage ===

  content_normalization:
    enabled: true
    implemented: true
    stage: synthesis
    wait_for: extraction
    prompt_template: content_normalization.zh.md
    provider: ${ACTIVE_LLM_PROVIDER}
    model: ${ACTIVE_LLM_MODEL}
    temperature: 0.1
    max_input_chars: 12000
    max_output_tokens: 2200
    json_required: true
    retry_on_parse_error: true
    max_retries: 1
    fallback: rule_based_content_normalization

  cross_source_deduplication:
    enabled: true
    implemented: true
    stage: synthesis
    prompt_template: cross_source_deduplication.zh.md
    provider: ${ACTIVE_LLM_PROVIDER}
    model: ${ACTIVE_LLM_MODEL}
    temperature: 0.1
    max_input_chars: 12000
    max_output_tokens: 2200
    json_required: true
    retry_on_parse_error: true
    max_retries: 1
    fallback: rule_based_claim_grouping

  research_synthesis:
    enabled: true
    implemented: true
    stage: synthesis
    prompt_template: research_synthesis.zh.md
    provider: ${ACTIVE_LLM_PROVIDER}
    model: ${ACTIVE_LLM_MODEL}
    temperature: 0.2
    max_input_chars: 16000
    max_output_tokens: 3000
    json_required: true
    retry_on_parse_error: true
    max_retries: 1
    fallback: rule_based_research_synthesis

  # === Export Stage ===

  content_translation:
    enabled: true
    implemented: true
    stage: export
    prompt_template: content_translation.zh.md
    temperature: 0.1
    max_input_chars: 15000
    max_output_tokens: 8000
    timeout_seconds: 300
    json_required: false
    retry_on_parse_error: false
    max_retries: 0
    fallback: skip_translation

  markdown_summary_generation:
    enabled: true
    implemented: true
    stage: export
    temperature: 0.3
    max_input_chars: 10000
    max_output_tokens: 1500
    json_required: false
    fallback: empty_sections

  final_index_synthesis:
    enabled: true
    implemented: true
    stage: export
    temperature: 0.3
    max_input_chars: 8000
    max_output_tokens: 2000
    json_required: true
    fallback: rule_based_index

  # === Processing Stage (optional) ===

  reranking:
    enabled: false
    implemented: false
    stage: processing
    temperature: 0.1
    max_input_chars: 5000
    max_output_tokens: 800
    fallback: score_sort

  # === Report Ingestion Stage ===

  report_understanding:
    enabled: true
    implemented: true
    stage: ingestion
    temperature: 0.2
    max_input_chars: 12000
    max_output_tokens: 1800
    fallback: empty_report_understanding

  report_reference_extraction:
    enabled: true
    implemented: true
    stage: ingestion
    temperature: 0.2
    max_input_chars: 12000
    max_output_tokens: 2200
    fallback: rule_only_references

  imported_source_prioritization:
    enabled: true
    implemented: true
    stage: ingestion
    temperature: 0.1
    max_input_chars: 8000
    max_output_tokens: 1600
    fallback: keep_rule_priority

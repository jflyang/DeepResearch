# 研究流程策略配置

auto_fetch:
  include_levels: ["S", "A", "B"]
  exclude_levels: ["C", "D"]

auto_normalization:
  include_levels: ["S", "A", "B"]
  exclude_levels: ["C", "D"]

auto_synthesis:
  enabled: true
  include_levels: ["S", "A", "B"]
  exclude_levels: ["C", "D"]
  require_extracted_documents: true
  min_extracted_documents: 1
  run_after_auto_fetch: true
  write_index: true
